# Activate this profile via env or JVM arg:
#   SPRING_PROFILES_ACTIVE=prod
#   --spring.profiles.active=prod

# ===============================
# SERVER / CLOUD RUN
# ===============================
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/xml,text/plain,text/css,image/svg+xml

# ===============================
# DATABASE (Cloud SQL via DB_URL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:mypassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# DATABASE POOL (prod tuning for Cloud Run)
# ===============================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA / Hibernate (prod safety)
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ===============================
# Flyway (on in prod)
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true

# ===============================
# CORS (prod origins)
# ===============================
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://compilingjava.com,https://www.compilingjava.com}
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:true}

# ===============================
# EMAIL VERIFY LINK (prod API host)
# ===============================
app.urls.email-verify-base=${EMAIL_VERIFY_BASE:https://api.compilingjava.com/api/auth/confirm-email}

# ===============================
# ACTUATOR / PROBES
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.mail.enabled=false

# ===============================
# LOGGING (quieter in prod)
# ===============================
app.http.log-api-requests=${LOG_API_REQUESTS:false}
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF
