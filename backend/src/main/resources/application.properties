# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE (PostgreSQL) — dev defaults, override via env
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:mypassword}
spring.datasource.driver-class-name=org.postgresql.Driver


# Hikari (dev)
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# JPA / Hibernate (dev)
# ===============================
# spring.jpa.hibernate.ddl-auto options: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Flyway (off in dev)
# ===============================
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ===============================
# CORS (dev)
# ===============================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}

# ===============================
# SECURITY / JWT
# ===============================
jwt.secret=${JWT_SECRET:0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF}
jwt.access.ttl-ms=${JWT_ACCESS_TTL_MS:2700000}         
jwt.refresh.ttl-ms=${JWT_REFRESH_TTL_MS:604800000}     
jwt.refresh.inactivity-ms=${JWT_REFRESH_INACT_MS:1800000} 

# Back-compat if some code still reads jwt.expiration
jwt.expiration=${jwt.access.ttl-ms}

# Refresh token cookie defaults (set HttpOnly/Secure in code)
app.cookies.refresh.name=refresh_token
app.cookies.refresh.path=/
app.cookies.refresh.same-site=Strict

app.auth.cookie.name=${APP_AUTH_COOKIE_NAME:access_token}
app.auth.cookie.path=${APP_AUTH_COOKIE_PATH:/}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie.domain=${APP_AUTH_COOKIE_DOMAIN:}

# ===============================
# EMAIL (dev)
# ===============================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:your_email@gmail.com}
spring.mail.password=${SMTP_PASSWORD:your_email_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email verification base (dev)
app.urls.email-verify-base=${EMAIL_VERIFY_BASE:http://localhost:8080/api/auth/confirm-email}
# Frontend base URL used after verification redirects.
app.web.base-url=${APP_WEB_BASE_URL:https://compilingjava.com}
# Disable mail entirely when not using SMTP.
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:no-reply@compilingjava.com}

# ===============================
# GOOGLE AUTH
# ===============================
# Comma-separated web client IDs allowed to sign in.
auth.google.client-ids=${GOOGLE_CLIENT_IDS:}
# Optional: restrict login to one Workspace domain, e.g. compilingjava.com
auth.google.allowed-domain=${GOOGLE_ALLOWED_DOMAIN:}
# Optional: if true, only @gmail.com accounts are accepted.
auth.google.require-gmail=${GOOGLE_REQUIRE_GMAIL:false}
# Optional admin allowlists (comma-separated):
# - prefer GOOGLE_ADMIN_SUBS for immutable identities
# - GOOGLE_ADMIN_EMAILS as convenience
auth.google.admin-subs=${GOOGLE_ADMIN_SUBS:}
auth.google.admin-emails=${GOOGLE_ADMIN_EMAILS:}
# If false, new users are auto-verified and password login does not block on email_verified.
auth.require-email-verification=${AUTH_REQUIRE_EMAIL_VERIFICATION:true}

# ===============================
# ADMIN BOOTSTRAP
# ===============================
# On startup, if this email is configured:
# - an existing matching user is promoted to ADMIN, or
# - on an empty database, an ADMIN account is inserted for that email
app.admin.bootstrap-email=${BOOTSTRAP_ADMIN_EMAIL:}
# Optional explicit username for the seeded admin. Defaults to the email local-part.
app.admin.bootstrap-username=${BOOTSTRAP_ADMIN_USERNAME:}
# Required when a new bootstrap admin must be inserted into an empty database.
# Ignored when the matching user already exists and is just being promoted to ADMIN.
app.admin.bootstrap-password=${BOOTSTRAP_ADMIN_PASSWORD:}

# ===============================
# ACTUATOR (dev)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===============================
# SPOTIFY
# ===============================
spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
spotify.user-refresh-token=${SPOTIFY_REFRESH_TOKEN:}
spotify.target-playlist-id=${SPOTIFY_TARGET_PLAYLIST_ID:}
spotify.token-url=${SPOTIFY_TOKEN_URL:https://accounts.spotify.com/api/token}
spotify.api-base-url=${SPOTIFY_API_BASE_URL:https://api.spotify.com/v1}

# ===============================
# LOGGING (verbose in dev)
# ===============================
app.http.log-api-requests=${LOG_API_REQUESTS:false}
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
